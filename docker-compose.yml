services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobsystem}
      POSTGRES_USER: ${POSTGRES_USER:-jobsystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsystem}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobsystem}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # Opt-in: only runs via `docker compose --profile e2e run --rm e2e`, never
  # as part of a plain `docker compose up`. Uses host networking so the
  # headless browser sees http://localhost:5173/8000 exactly as a real
  # browser on the host would — matching frontend/.env's VITE_API_BASE_URL
  # and backend CORS_ALLOWED_ORIGINS without needing test-only overrides.
  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    profiles: ["e2e"]
    network_mode: host
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
